---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seerynx-frontend
  namespace: seerynx
  labels:
    app: seerynx-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seerynx-frontend
  template:
    metadata:
      labels:
        app: seerynx-frontend
    spec:
      imagePullSecrets:
        - name: local-registry-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: seerynx-frontend
          ports:
            - containerPort: 80
          env:
            - name: SEERYNX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: seerynx-secrets
                  key: api-key
            - name: NGINX_ENVSUBST_FILTER
              value: "SEERYNX_API_KEY"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /var/cache/nginx
            - name: run
              mountPath: /var/run
            - name: conf
              mountPath: /etc/nginx/conf.d
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
        - name: run
          emptyDir: {}
        - name: conf
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: seerynx-frontend
  namespace: seerynx
  labels:
    app: seerynx-frontend
spec:
  type: ClusterIP
  selector:
    app: seerynx-frontend
  ports:
    - port: 80
      targetPort: 80