---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seerynx-models
  namespace: seerynx
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seerynx-inference
  namespace: seerynx
  labels:
    app: seerynx-inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seerynx-inference
  template:
    metadata:
      labels:
        app: seerynx-inference
    spec:
      imagePullSecrets:
        - name: local-registry-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: inference
          image: seerynx-inference
          ports:
            - containerPort: 8001
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          env:
            - name: HOME
              value: "/tmp"
            - name: MQTT_HOST
              value: "mosquitto.seerynx.svc.cluster.local"
            - name: MQTT_PORT
              value: "1883"
            - name: MQTT_USER
              value: "seerynx"
            - name: MQTT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: seerynx-secrets
                  key: mqtt-password
            - name: SEERYNX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: seerynx-secrets
                  key: api-key
            - name: API_BASE_URL
              value: "http://seerynx-api:8000"
            - name: MODELS_DIR
              value: "/models"
            - name: PHOTOS_DIR
              value: "/app/photos"
            - name: DETECTION_THRESHOLD
              value: "0.5"
            - name: CLASSIFICATION_THRESHOLD
              value: "0.3"
            - name: BIRDNET_THRESHOLD
              value: "0.7"
          volumeMounts:
            - name: models
              mountPath: /models
            - name: photos
              mountPath: /app/photos
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: seerynx-models
        - name: photos
          persistentVolumeClaim:
            claimName: seerynx-photos
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: seerynx-inference
  namespace: seerynx
  labels:
    app: seerynx-inference
spec:
  type: ClusterIP
  selector:
    app: seerynx-inference
  ports:
    - port: 8001
      targetPort: 8001