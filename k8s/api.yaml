---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seerynx-photos
  namespace: seerynx
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seerynx-static
  namespace: seerynx
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seerynx-api
  namespace: seerynx
  labels:
    app: seerynx-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seerynx-api
  template:
    metadata:
      labels:
        app: seerynx-api
    spec:
      imagePullSecrets:
        - name: local-registry-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: migrations
          image: seerynx-api
          command: ["alembic", "upgrade", "head"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: database-url
            - name: SEERYNX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: seerynx-secrets
                  key: api-key
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      containers:
        - name: api
          image: seerynx-api
          ports:
            - containerPort: 8000
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: database-url
            - name: SEERYNX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: seerynx-secrets
                  key: api-key
            - name: ALLOWED_ORIGINS
              value: "https://seerynx.local,http://localhost:5173"
            - name: ALLOWED_HOSTS
              value: "seerynx.local,seerynx-api,seerynx-api:8000"
            - name: PHOTOS_DIR
              value: "/app/photos"
            - name: STATIC_DIR
              value: "/app/static"
            - name: DISPLAY_TIMEZONE
              value: "America/New_York"
            - name: INFERENCE_SERVICE_URL
              value: "http://seerynx-inference:8001"
          volumeMounts:
            - name: photos
              mountPath: /app/photos
            - name: static
              mountPath: /app/static
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
              httpHeaders:
                - name: Host
                  value: seerynx.local
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
              httpHeaders:
                - name: Host
                  value: seerynx.local
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: photos
          persistentVolumeClaim:
            claimName: seerynx-photos
        - name: static
          persistentVolumeClaim:
            claimName: seerynx-static
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: seerynx-api
  namespace: seerynx
  labels:
    app: seerynx-api
spec:
  type: ClusterIP
  selector:
    app: seerynx-api
  ports:
    - port: 8000
      targetPort: 8000